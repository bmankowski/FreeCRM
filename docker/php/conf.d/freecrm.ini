; FreeCRM Docker defaults for installer recommendations
; Note: this file is loaded by PHP from conf.d

; ConfReport check also flags E_STRICT/E_DEPRECATED as undesirable in installer.
error_reporting = E_ALL & ~E_NOTICE & ~E_DEPRECATED & ~E_STRICT

; Installer expects literal "On"
output_buffering = On

; Timeouts
max_execution_time = 600
max_input_time = 600
default_socket_timeout = 600

; Security/hardening
display_errors = Off
expose_php = Off
session.cookie_httponly = On
session.cookie_secure = On

; Upload limits
post_max_size = 50M
upload_max_filesize = 100M
max_input_vars = 10000

; Session GC tuning
session.gc_divisor = 500


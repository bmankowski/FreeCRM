; FreeCRM PHP-FPM pool overrides for installer recommended settings
[www]
php_admin_flag[display_errors] = off
php_admin_flag[log_errors] = on
php_admin_value[error_reporting] = E_ALL & ~E_NOTICE & ~E_DEPRECATED & ~E_STRICT
php_admin_value[output_buffering] = On
php_admin_value[max_execution_time] = 600
php_admin_value[max_input_time] = 600
php_admin_value[default_socket_timeout] = 600
php_admin_value[post_max_size] = 50M
php_admin_value[upload_max_filesize] = 100M
php_admin_value[max_input_vars] = 10000
php_admin_flag[session.cookie_httponly] = on
php_admin_value[session.gc_divisor] = 500


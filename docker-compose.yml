services:
  web:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "80:8080"
      - "443:443"
    user: "33:33" # www-data
    environment:
      NGINX_ENTRYPOINT_QUIET_LOGS: "1"
    tmpfs:
      - /var/cache/nginx:uid=33,gid=33,mode=0755
      - /var/run:uid=33,gid=33,mode=0755
    volumes:
      - ./:/var/www/html:ro
      # Writable overlays for runtime data
      - ./storage:/var/www/html/storage
      - ./cache:/var/www/html/cache
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
      - ./docker/nginx/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    environment:
      # App will read these via config/config_override.php
      FREECRM_DB_HOST: db
      FREECRM_DB_PORT: "3306"
      FREECRM_DB_NAME: freecrm
      FREECRM_DB_USER: freecrm
      FREECRM_DB_PASSWORD: freecrm
      # When behind nginx, keep base URL consistent
      FREECRM_SITE_URL: "https://dev.itconnect.pl/"
      FREECRM_FORCE_SSL: "1"
      FREECRM_PDF_CHROME_BINARY: "/usr/bin/chromium"
      FREECRM_PDF_BASE_URL: "http://web:8080/"
      # DebugBar tries to query DB early; disable in docker install flow
      YII_DEBUG: "0"
    volumes:
      - ./:/var/www/html
      - ./import:/var/www/import
    depends_on:
      - db
    restart: unless-stopped

  cron:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    # root so dev CV rsync can use mounted ~/.ssh; vtigercron runs as www-data via gosu in crontab
    environment:
      FREECRM_DB_HOST: db
      FREECRM_DB_PORT: "3306"
      FREECRM_DB_NAME: freecrm
      FREECRM_DB_USER: freecrm
      FREECRM_DB_PASSWORD: freecrm
      FREECRM_SITE_URL: "https://dev.itconnect.pl/"
      FREECRM_FORCE_SSL: "1"
      YII_DEBUG: "0"
      CV_IMPORT_CONFIG: /var/www/html/docker/cv-sync/cv-import.from-prod-backup.conf
    volumes:
      - ./:/var/www/html
      - ./import:/var/www/import
      - ./docker/cron/crontab:/etc/freecrm-cron:ro
      - ${HOME}/.ssh:/root/.ssh:ro
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/usr/local/bin/supercronic"]
    command: ["/etc/freecrm-cron"]
    restart: unless-stopped

  db:
    image: mariadb:11.6
    ports:
      - "3306:3306"
    environment:
      MARIADB_DATABASE: freecrm
      MARIADB_USER: freecrm
      MARIADB_PASSWORD: freecrm
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
      - ./src/Modules/Install/install_schema/scheme.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./src/Modules/Install/install_schema/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  # Manual job crawl (Verama → import/jobs). Does not start with default `up`.
  # Run: docker compose --profile crawler run --rm verama-crawler
  verama-crawler:
    build:
      context: .
      dockerfile: docker/verama-crawler/Dockerfile
    profiles:
      - crawler
    env_file:
      - docker/verama-crawler/verama.env
    environment:
      VERAMA_OUTPUT_DIR: /var/www/import/jobs
      VERAMA_LOG_PATH: /var/www/html/cache/logs/verama-crawler.log
    volumes:
      - ./import:/var/www/import
      - ./cache/logs:/var/www/html/cache/logs
      - ./scripts/job-crawlers:/opt/crawlers:ro
    working_dir: /opt/crawlers
    restart: "no"

volumes:
  db_data:
